name: Deploy Backend

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Firebase Service Account File
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}" | base64 -d > src/main/resources/firebase-service-account.json

      - name: Build JAR
        run: |
          mvn clean package -DskipTests

      - name: Copy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 1

      - name: Set Environment Variables on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GOOGLE_MAPS_API_KEY,REDIS_HOST,REDIS_PORT,REDIS_PASSWORD
          script: |
            ENV_FILE="/home/ubuntu/app/.env"

            # Google Maps
            if grep -q "^GOOGLE_MAPS_API_KEY=" "$ENV_FILE" 2>/dev/null; then
              sed -i "s|^GOOGLE_MAPS_API_KEY=.*|GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}|" "$ENV_FILE"
            else
              echo "GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}" >> "$ENV_FILE"
            fi

            # Redis
            if grep -q "^REDIS_HOST=" "$ENV_FILE" 2>/dev/null; then
              sed -i "s|^REDIS_HOST=.*|REDIS_HOST=${REDIS_HOST}|" "$ENV_FILE"
            else
              echo "REDIS_HOST=${REDIS_HOST}" >> "$ENV_FILE"
            fi

            if grep -q "^REDIS_PORT=" "$ENV_FILE" 2>/dev/null; then
              sed -i "s|^REDIS_PORT=.*|REDIS_PORT=${REDIS_PORT}|" "$ENV_FILE"
            else
              echo "REDIS_PORT=${REDIS_PORT}" >> "$ENV_FILE"
            fi

            if grep -q "^REDIS_PASSWORD=" "$ENV_FILE" 2>/dev/null; then
              sed -i "s|^REDIS_PASSWORD=.*|REDIS_PASSWORD=${REDIS_PASSWORD}|" "$ENV_FILE"
            else
              echo "REDIS_PASSWORD=${REDIS_PASSWORD}" >> "$ENV_FILE"
            fi
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

      - name: Ensure Redis is Running
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Install Redis if not present
            if ! command -v redis-cli &> /dev/null; then
              echo "❌ Redis not installed — installing..."
              sudo apt-get update -y && sudo apt-get install -y redis-server
              sudo systemctl enable redis-server
            fi

            # Read password from .env
            REDIS_PASSWORD=$(grep "^REDIS_PASSWORD=" /home/ubuntu/app/.env | cut -d '=' -f2)

            # Apply password to redis.conf
            if [ -n "$REDIS_PASSWORD" ]; then
              if grep -q "^requirepass" /etc/redis/redis.conf; then
                sudo sed -i "s|^requirepass.*|requirepass ${REDIS_PASSWORD}|" /etc/redis/redis.conf
              else
                sudo sed -i "s|^# requirepass.*|requirepass ${REDIS_PASSWORD}|" /etc/redis/redis.conf
              fi
            fi

            # Ensure Redis is bound to localhost only (security)
            sudo sed -i "s|^bind .*|bind 127.0.0.1|" /etc/redis/redis.conf

            # Restart Redis to apply config changes
            sudo systemctl restart redis 2>/dev/null || sudo systemctl restart redis-server

            # Verify Redis is responding
            sleep 1
            if redis-cli -a "$REDIS_PASSWORD" ping 2>/dev/null | grep -q PONG; then
              echo "✅ Redis is running and authenticated"
            else
              echo "⚠️ Redis ping failed — check /etc/redis/redis.conf"
              exit 1
            fi

      - name: Configure JVM Tuning & Restart Service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # --- Find the deployed JAR ---
            JAR_FILE=$(ls -t /home/ubuntu/app/*.jar 2>/dev/null | head -1)
            if [ -z "$JAR_FILE" ]; then
              echo "❌ No JAR file found in /home/ubuntu/app/"
              exit 1
            fi
            echo "✅ Found JAR: $JAR_FILE"

            # --- Write optimized systemd service with JVM memory tuning ---
            sudo tee /etc/systemd/system/ocpp.service > /dev/null <<EOF
            [Unit]
            Description=Bentork EV Charging Backend (OCPP)
            After=network.target redis-server.service

            [Service]
            User=ubuntu
            WorkingDirectory=/home/ubuntu/app
            EnvironmentFile=/home/ubuntu/app/.env

            # ========== JVM MEMORY TUNING (Optimization 1) ==========
            # -Xms512m / -Xmx512m : Fix heap at 512 MB (prevents OOM on t3.micro 1 GB RAM)
            # -XX:+UseG1GC         : G1 garbage collector — best for low-latency apps
            # -XX:MaxGCPauseMillis  : Target max 200ms GC pauses
            # -XX:+HeapDumpOnOOM    : Auto-dump heap on crash for debugging
            # -XX:MaxMetaspaceSize  : Cap metaspace to prevent unbounded class loading
            ExecStart=/usr/bin/java \
              -Xms512m \
              -Xmx512m \
              -XX:+UseG1GC \
              -XX:MaxGCPauseMillis=200 \
              -XX:+HeapDumpOnOutOfMemoryError \
              -XX:HeapDumpPath=/home/ubuntu/app/heapdump.hprof \
              -XX:MaxMetaspaceSize=128m \
              -jar ${JAR_FILE}

            Restart=always
            RestartSec=10
            StandardOutput=journal
            StandardError=journal

            [Install]
            WantedBy=multi-user.target
            EOF

            echo "✅ systemd service updated with JVM tuning"

            # --- Reload and restart ---
            sudo systemctl daemon-reload
            sudo systemctl restart ocpp.service
            sleep 3
            sudo systemctl status ocpp.service --no-pager

            # --- Verify JVM flags are active ---
            echo ""
            echo "--- Verifying JVM flags ---"
            PID=$(pgrep -f "evchargingsystem" || true)
            if [ -n "$PID" ]; then
              echo "✅ App running with PID: $PID"
              ps -p $PID -o args= | head -1
            else
              echo "⚠️  App may still be starting..."
            fi