spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# app.jwt.secret=YOUR_SUPER_LONG_SECRET_KEY_OVER_64_CHARS


# Optional: Set MySQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Pessimistic lock timeout (milliseconds) - prevents indefinite waiting
# If a charger row is locked by another transaction, wait max 5 seconds
spring.jpa.properties.jakarta.persistence.lock.timeout=5000


# JWT Configuration - Secret is read from environment variable JWT_SECRET
# Generate a strong Base64 key of at least 64 bytes (512 bits)
# Set JWT_SECRET in .env file or environment variables
app.jwt.secret=${JWT_SECRET:dGVzdHNlY3JldHRlc3RzZWNyZXR0ZXN0c2VjcmV0dGVzdHNlY3JldHRlc3Q=}
# Optional, default 7 days (in milliseconds): 7 * 24 * 60 * 60 * 1000 = 604800000
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}  


spring.mail.host=smtp.gmail.com
spring.mail.port=587
