spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}


spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=https://dev.bentork.in/login/oauth2/code/google

# OCPP Configuration
ocpp.server.port=8887
ocpp.heartbeat.interval=60

# OCPP WebSocket Ping-Pong Configuration
# How often the server sends a WebSocket ping frame to chargers (seconds)
ocpp.websocket.ping.interval=30

# How long to wait for a pong response before considering the connection dead (seconds)
ocpp.websocket.pong.timeout=90

# Logging
logging.level.com.bentork.ev_system.service.OcppWebSocketServer=INFO

# server.port=

# logging.level.root=error

# Tax Rates
tax.gst.rate=0.18

# Firebase Configuration
firebase.service-account.path=classpath:firebase-service-account.json

# Google Maps Places API
google.maps.api.key=${GOOGLE_MAPS_API_KEY:}

# Truecaller OAuth2 Configuration
truecaller.client-id=${TRUECALLER_CLIENT_ID:}
truecaller.web.client-id=${TRUECALLER_WEB_CLIENT_ID:}
truecaller.token-url=https://oauth-account-noneu.truecaller.com/v1/token
truecaller.userinfo-url=https://oauth-account-noneu.truecaller.com/v1/userinfo

# ===================== Redis Cache Configuration =====================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.cache.type=redis

# ===================== Tomcat Thread Tuning =====================
# Reduce threads to save memory on 1GB RAM instance 
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5
server.tomcat.accept-count=50

# ===================== Scheduling Thread Pool =====================
# Increase default Spring scheduling thread pool size (Optimization 3)
spring.task.scheduling.pool.size=5

# ===================== HikariCP Database Connection Pool =====================
# Tune connection pool for db.t3.micro limits (Optimization 4)
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# ===================== Guest Mode Rate Limiting =====================
# Max unauthenticated requests per minute per IP address
rate.limit.requests-per-minute=60
# Set to false to disable rate limiting
rate.limit.enabled=true
